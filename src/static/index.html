<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPvs</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23ff0000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20.34 17.52a10 10 0 1 0-2.82 2.82'/><circle cx='19' cy='19' r='2'/><path d='m13.41 13.41 4.18 4.18'/><circle cx='12' cy='12' r='2'/></svg>">
  <style>
    @font-face {
      font-family: 'Departure Mono';
      src: url('/fonts/DepartureMono-Regular.otf') format('opentype');
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="topbar">
    <div class="topbar-title">
      <span id="topbar-icon" class="topbar-icon"></span>
      ARPvs
    </div>
    <div class="topbar-search">
      <input type="text" id="search-input" placeholder="search..." autocomplete="off">
    </div>
    <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode" data-tooltip="Toggle theme"></button>
    <button class="icon-btn width-toggle" id="width-toggle" aria-label="Toggle reading width" data-tooltip="Reading width"></button>
    <button class="icon-btn" id="fullscreen-btn" aria-label="Toggle fullscreen" data-tooltip="Fullscreen (F)"></button>
    <button id="reload-btn" class="topbar-reload" aria-label="Reload page" data-tooltip="Reload"></button>
  </header>

  <!-- Main layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Index</div>
        <a href="#" class="sidebar-link active" data-view="all">all tracks</a>
        <a href="#" class="sidebar-link" data-view="albums">albums</a>
        <a href="#" class="sidebar-link" data-view="unexported">unexported</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Visual</div>
        <a href="#" class="sidebar-link" data-view="visualizers">visualizers</a>
      </div>
      <div class="sidebar-section sidebar-palette">
        <div class="sidebar-label">Palette</div>
        <div class="sidebar-palette-controls">
          <input type="color" class="accent-picker" id="accent-color" aria-label="Choose accent color" data-tooltip="Accent color">
          <div class="palette-preview" id="palette-preview">
            <span class="swatch" data-tooltip="Accent"></span>
            <span class="swatch" data-tooltip="Warm"></span>
            <span class="swatch" data-tooltip="Cool"></span>
            <span class="swatch" data-tooltip="Comp"></span>
          </div>
          <button class="palette-mode-btn" id="palette-mode" type="button">SPL</button>
        </div>
      </div>
    </nav>

    <!-- Content area -->
    <main class="content" id="content">
      <div class="empty-state">
        <p>no tracks found</p>
        <p class="text-muted">configure SCAN_ROOT in .env and restart</p>
      </div>
    </main>
  </div>

    <div class="viz-meter-bar" id="viz-meter-bar">
    <div class="viz-meter-cell" data-mode="bars" data-tooltip="Bars"><canvas class="viz-meter-canvas"></canvas></div>
    <div class="viz-meter-cell" data-mode="waveform" data-tooltip="Waveform"><canvas class="viz-meter-canvas"></canvas></div>
    <div class="viz-meter-cell" data-mode="particles" data-tooltip="Particles"><canvas class="viz-meter-canvas"></canvas></div>
    <div class="viz-meter-cell" data-mode="dither" data-tooltip="Dither"><canvas class="viz-meter-canvas"></canvas></div>
    <div class="viz-meter-cell" data-mode="scope" data-tooltip="Scope"><canvas class="viz-meter-canvas"></canvas></div>
    <div class="viz-meter-cell" data-mode="spectrogram" data-tooltip="Spectrogram"><canvas class="viz-meter-canvas"></canvas></div>
  </div>

  <!-- Player bar -->
  <footer class="player-bar">
    <div class="player-progress-top" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="player-inner">
      <div class="player-now-playing">
        <div class="player-art" id="player-art">
          <span class="player-art-placeholder" id="player-art-icon"></span>
        </div>
        <div class="player-track-info">
          <span class="player-title" id="player-title">--</span>
          <span class="player-sub" id="player-project">--</span>
        </div>
      </div>
      <div class="player-controls">
        <button class="player-btn" id="btn-prev" aria-label="Previous" data-tooltip="Previous"></button>
        <button class="player-btn player-btn-play" id="btn-play" aria-label="Play" data-tooltip="Play"></button>
        <button class="player-btn" id="btn-next" aria-label="Next" data-tooltip="Next"></button>
        <button class="player-btn" id="btn-shuffle" aria-label="Shuffle" data-tooltip="Shuffle"></button>
        <button class="player-btn" id="btn-loop" aria-label="Loop" data-tooltip="Loop"></button>
      </div>
      <div class="player-time-display">
        <span class="player-time" id="player-current">0:00</span>
        <span class="player-time-sep">/</span>
        <span class="player-time" id="player-duration">0:00</span>
      </div>
      <button class="player-btn player-btn-viz-fullscreen" id="btn-viz-fullscreen" aria-label="Fullscreen visualizer" data-tooltip="Visualizer (V)"></button>
      <div class="player-volume">
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" aria-label="Volume" data-tooltip="Volume">
      </div>
    </div>
  </footer>

  <!-- Splash screen -->
  <div id="splash-screen" class="splash-screen">
    <canvas id="dither-bg"></canvas>
    <div class="splash-content">
      <div class="splash-header">
        <span class="splash-brand">ARPvs®</span>
        <span class="splash-ref">Interactive Shell</span>
      </div>
      <div class="splash-boot">
        <div class="boot-line">INIT SYSTEM</div>
        <div class="boot-line">SCAN LIBRARY</div>
        <div class="boot-line">LOAD INDEX</div>
        <div class="boot-line boot-line-ready">READY</div>
      </div>
      <span class="splash-cursor"></span>
    </div>
  </div>

  <audio id="audio-element"></audio>
  <script src="/js/main.js" type="module"></script>
</body>
</html>
