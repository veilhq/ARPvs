<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPvs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="topbar">
    <div class="topbar-title">ARPvs</div>
    <div class="topbar-search">
      <input type="text" id="search-input" placeholder="search..." autocomplete="off">
    </div>
  </header>

  <!-- Main layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">LIBRARY</div>
        <a href="#" class="sidebar-link active" data-view="all">* all tracks</a>
        <a href="#" class="sidebar-link" data-view="albums"># albums</a>
        <a href="#" class="sidebar-link" data-view="projects">+ projects</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">ORGANIZE</div>
        <a href="#" class="sidebar-link" data-view="collections">~ collections</a>
        <a href="#" class="sidebar-link" data-view="favorites">- favorites</a>
      </div>
    </nav>

    <!-- Content area -->
    <main class="content" id="content">
      <div class="empty-state">
        <p>no tracks found</p>
        <p class="text-muted">configure SCAN_ROOT in .env and restart</p>
      </div>
    </main>
  </div>

  <!-- Player bar -->
  <footer class="player-bar">
    <div class="player-now-playing">
      <div class="player-art" id="player-art">
        <span class="player-art-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg></span>
      </div>
      <div class="player-track-info">
        <span class="player-title" id="player-title">--</span>
        <span class="player-sub" id="player-project">--</span>
      </div>
    </div>
    <div class="player-controls">
      <button class="player-btn" id="btn-prev" title="Previous">&lt;</button>
      <button class="player-btn player-btn-play" id="btn-play" title="Play"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
      <button class="player-btn" id="btn-next" title="Next">&gt;</button>
    </div>
    <div class="player-progress">
      <span class="player-time" id="player-current">0:00</span>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="player-time" id="player-duration">0:00</span>
    </div>
    <div class="player-volume">
      <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
    </div>
  </footer>

  <audio id="audio-element"></audio>
  <script src="/js/main.js" type="module"></script>
</body>
</html>
