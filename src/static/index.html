<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPvs</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2300ff41' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20.34 17.52a10 10 0 1 0-2.82 2.82'/><circle cx='19' cy='19' r='2'/><path d='m13.41 13.41 4.18 4.18'/><circle cx='12' cy='12' r='2'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="topbar">
    <div class="topbar-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="topbar-icon"><path d="M20.34 17.52a10 10 0 1 0-2.82 2.82"/><circle cx="19" cy="19" r="2"/><path d="m13.41 13.41 4.18 4.18"/><circle cx="12" cy="12" r="2"/></svg>
      ARPvs
    </div>
    <div class="topbar-search">
      <input type="text" id="search-input" placeholder="search..." autocomplete="off">
    </div>
    <div class="topbar-accent-selector">
      <label for="accent-color" class="accent-label">accent</label>
      <input type="color" id="accent-color" class="accent-picker" value="#00ff41" title="Choose accent color">
    </div>
  </header>

  <!-- Main layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">LIBRARY</div>
        <a href="#" class="sidebar-link active" data-view="all">* all tracks</a>
        <a href="#" class="sidebar-link" data-view="albums"># albums</a>
        <a href="#" class="sidebar-link" data-view="unexported">⚙ unexported</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">ORGANIZE</div>
        <a href="#" class="sidebar-link" data-view="collections">~ collections</a>
        <a href="#" class="sidebar-link" data-view="favorites">- favorites</a>
      </div>
    </nav>

    <!-- Content area -->
    <main class="content" id="content">
      <div class="empty-state">
        <p>no tracks found</p>
        <p class="text-muted">configure SCAN_ROOT in .env and restart</p>
      </div>
    </main>
  </div>

  <!-- Player bar -->
  <footer class="player-bar">
    <div class="player-now-playing">
      <div class="player-art" id="player-art">
        <span class="player-art-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg></span>
      </div>
      <div class="player-track-info">
        <span class="player-title" id="player-title">--</span>
        <span class="player-sub" id="player-project">--</span>
      </div>
    </div>
    <div class="player-controls">
      <button class="player-btn" id="btn-prev" title="Previous"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="4" x2="5" y2="20"></line></svg></button>
      <button class="player-btn player-btn-play" id="btn-play" title="Play"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
      <button class="player-btn" id="btn-next" title="Next"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="4" x2="19" y2="20"></line></svg></button>
      <div class="player-btn-separator"></div>
      <button class="player-btn" id="btn-shuffle" title="Shuffle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 3 5"></polyline><polyline points="21 17 15 11 21 5"></polyline><line x1="3" y1="5" x2="3" y2="19"></line><line x1="21" y1="5" x2="21" y2="19"></line></svg></button>
      <button class="player-btn" id="btn-loop" title="Loop"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 2 21 6 17 10"></polyline><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><polyline points="7 22 3 18 7 14"></polyline><path d="M21 13v1a4 4 0 0 1-4 4H3"></path></svg></button>
    </div>
    <div class="player-progress">
      <span class="player-time" id="player-current">0:00</span>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="player-time" id="player-duration">0:00</span>
    </div>
    <div class="player-volume">
      <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
    </div>
  </footer>

  <audio id="audio-element"></audio>
  <script src="/js/main.js" type="module"></script>
</body>
</html>
